<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brainrot AI — Your Study Helper</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: #1e1e2e;
      --accent: #6c63ff;
      --accent2: #ff6584;
      --text: #e8e8f0;
      --muted: #5a5a7a;
      --bot-bubble: #13131f;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(10,10,15,0.95);
      backdrop-filter: blur(12px);
      position: relative;
      z-index: 10;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 18px;
      background: linear-gradient(90deg, #fff, var(--muted));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--muted);
      margin-left: 2px;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      background: #4ade80;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    .model-tag {
      font-size: 11px;
      background: var(--border);
      border: 1px solid #2a2a3e;
      padding: 3px 10px;
      border-radius: 20px;
      color: var(--muted);
    }

    @keyframes pulse {
      0%,100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .chat-area::-webkit-scrollbar {
      width: 4px;
    }

    .chat-area::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    .message-row {
      display: flex;
      padding: 4px 24px;
      animation: fadeSlide 0.3s ease;
    }

    .message-row.user {
      justify-content: flex-end;
    }

    .message-row.bot {
      justify-content: flex-start;
      align-items: flex-start;
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .bubble {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .user .bubble {
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .bot .bubble {
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    .bot-avatar {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      margin-right: 10px;
      margin-top: 2px;
      flex-shrink: 0;
    }

    .typing {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 12px 16px;
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      border-radius: 16px;
      border-bottom-left-radius: 4px;
    }

    .typing span {
      width: 7px;
      height: 7px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 12px;
      padding: 40px;
      text-align: center;
    }

    .welcome-icon {
      width: 72px;
      height: 72px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      margin-bottom: 8px;
    }

    .welcome h2 {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 700;
    }

    .welcome p {
      color: var(--muted);
      font-size: 14px;
      max-width: 340px;
      line-height: 1.6;
    }

    .suggestion-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 8px;
    }

    .chip {
      padding: 8px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
    }

    .chip:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .input-area {
      padding: 16px 24px 20px;
      border-top: 1px solid var(--border);
      background: rgba(10,10,15,0.95);
      backdrop-filter: blur(12px);
      position: relative;
      z-index: 10;
    }

    .input-box {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 12px 16px;
    }

    .input-box:focus-within {
      border-color: var(--accent);
    }

    .input {
      flex: 1;
      background: none;
      border: none;
      color: var(--text);
      font-size: 14px;
      outline: none;
      padding: 4px 0;
    }

    .send-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .send-btn:hover {
      background: #5a4fff;
    }

    .send-btn svg {
      width: 16px;
      height: 16px;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <div class="logo-icon"></div>
      <div>
        <div class="logo-text">Brainrot AI</div>
        <div class="logo-sub">Study Helper</div>
      </div>
    </div>
    <div class="status">
      <div class="status-dot"></div>
      <span>Online</span>
      <div class="model-tag">OpenAI Chat</div>
    </div>
  </header>

  <div class="chat-area" id="chatArea">
    <div class="welcome">
      <div class="welcome-icon"></div>
      <h2>Hey, what's up?</h2>
      <p>Ask me anything about your engineering drawings, sections, or study doubts.</p>
      <div class="suggestion-chips">
        <div class="chip" onclick="sendSuggestion('Explain square pyramid projections')">Pyramid projections</div>
        <div class="chip" onclick="sendSuggestion('Hexagonal prism section steps')">Prism sections</div>
        <div class="chip" onclick="sendSuggestion('True shape auxiliary view')">True shape</div>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-box">
      <input type="text" class="input" id="messageInput" placeholder="Ask about your drawing problem...">
      <button class="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M2 21l21-9-21-9 5 9-5 9zm7-9h0"></path>
        </svg>
      </button>
    </div>
  </div>

  <script>
    let messages = [
      {
        role: "system",
        content: "You are a helpful study assistant. Reply clearly and simply."
      }
    ];

    async function sendMessage() {
      const input = document.getElementById('messageInput');
      const chatArea = document.getElementById('chatArea');
      const text = input.value.trim();

      if (!text) return;

      const welcome = document.querySelector('.welcome');
      if (welcome) welcome.remove();

      chatArea.innerHTML += `
        <div class="message-row user">
          <div class="bubble">${escapeHtml(text)}</div>
        </div>
      `;

      messages.push({ role: "user", content: text });
      input.value = '';
      chatArea.scrollTop = chatArea.scrollHeight;

      chatArea.innerHTML += `
        <div class="message-row bot" id="typingRow">
          <div class="bot-avatar"></div>
          <div class="typing">
            <span></span><span></span><span></span>
          </div>
        </div>
      `;
      chatArea.scrollTop = chatArea.scrollHeight;

      try {
        const response = await fetch('https://api.openai.com/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer YOUR_OPENAI_API_KEY'
          },
          body: JSON.stringify({
            model: 'gpt-4o-mini',
            messages: messages
          })
        });

        const data = await response.json();
        const reply =
          data.choices?.[0]?.message?.content ||
          'No response received.';

        messages.push({ role: "assistant", content: reply });

        const typingRow = document.getElementById('typingRow');
        if (typingRow) {
          typingRow.outerHTML = `
            <div class="message-row bot">
              <div class="bot-avatar"></div>
              <div class="bubble">${escapeHtml(reply)}</div>
            </div>
          `;
        }
      } catch (error) {
        const typingRow = document.getElementById('typingRow');
        if (typingRow) {
          typingRow.outerHTML = `
            <div class="message-row bot">
              <div class="bot-avatar"></div>
              <div class="bubble">Error connecting to API. Check your key or network.</div>
            </div>
          `;
        }
      }

      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function sendSuggestion(text) {
      document.getElementById('messageInput').value = text;
      sendMessage();
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    document.getElementById('messageInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>
