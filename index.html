<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brainrot AI — Your Study Helper</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --text: #e8e8f0;
    --muted: #5a5a7a;
    --bot-bubble: #13131f;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  header { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-bottom: 1px solid var(--border); background: rgba(10,10,15,0.95); backdrop-filter: blur(12px); position: relative; z-index: 10; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon { width: 32px; height: 32px; border-radius: 8px; overflow: hidden; flex-shrink: 0; }
  .logo-icon img { width: 100%; height: 100%; object-fit: cover; }
  .logo-text { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; background: linear-gradient(90deg, #fff, var(--muted)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .logo-sub { font-size: 11px; color: var(--muted); font-family: 'DM Sans', sans-serif; margin-left: 6px; }
  .status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
  .status-dot { width: 7px; height: 7px; background: #4ade80; border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .model-tag { font-size: 11px; background: var(--border); border: 1px solid #2a2a3e; padding: 3px 10px; border-radius: 20px; color: var(--muted); }
  .chat-area { flex: 1; overflow-y: auto; padding: 24px 0; display: flex; flex-direction: column; gap: 8px; }
  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .message-row { display: flex; padding: 4px 24px; animation: fadeSlide 0.3s ease; }
  @keyframes fadeSlide { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .message-row.user { justify-content: flex-end; }
  .message-row.bot { justify-content: flex-start; }
  .bubble { max-width: 70%; padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.6; }
  .user .bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
  .bot .bubble { background: var(--bot-bubble); border: 1px solid var(--border); color: var(--text); border-bottom-left-radius: 4px; }
  .bot-avatar { width: 28px; height: 28px; border-radius: 8px; overflow: hidden; margin-right: 10px; margin-top: 2px; flex-shrink: 0; }
  .bot-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .typing { display: flex; align-items: center; gap: 4px; padding: 12px 16px; }
  .typing span { width: 7px; height: 7px; background: var(--muted); border-radius: 50%; animation: bounce 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
  .welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 12px; padding: 40px; text-align: center; }
  .welcome-icon { width: 72px; height: 72px; border-radius: 16px; overflow: hidden; margin-bottom: 8px; }
  .welcome-icon img { width: 100%; height: 100%; object-fit: cover; }
  .welcome h2 { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; }
  .welcome p { color: var(--muted); font-size: 14px; max-width: 340px; line-height: 1.6; }
  .suggestion-chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 8px; }
  .chip { padding: 8px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; font-size: 13px; color: var(--muted); cursor: pointer; transition: all 0.2s; }
  .chip:hover { border-color: var(--accent); color: var(--text); }
  .input-area { padding: 16px 24px 20px; border-top: 1px solid var(--border); background: rgba(10,10,15,0.95); backdrop-filter: blur(12px); position: relative; z-index: 10; }
  .input-box { display: flex; align-items: flex-end; gap: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 10px 12px; transition: border-color 0.2s; }
  .input-box:focus-within { border-color: var(--accent); }
  textarea { flex: 1; background: none; border: none; outline: none; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; resize: none; max-height: 120px; min-height: 24px; line-height: 1.5; }
  textarea::placeholder { color: var(--muted); }
  .send-btn { width: 34px; height: 34px; background: var(--accent); border: none; border-radius: 9px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
  .send-btn:hover { background: #7c74ff; transform: scale(1.05); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .send-btn svg { width: 16px; height: 16px; fill: white; }
  .input-footer { text-align: center; margin-top: 8px; font-size: 11px; color: var(--muted); }
  .reveal-banner { display: none; background: linear-gradient(90deg, #ff6584, #ff9a5c); color: white; text-align: center; padding: 10px; font-size: 13px; font-weight: 600; z-index: 20; position: relative; animation: fadeSlide 0.5s ease; }
  .reveal-banner.show { display: block; }
  .music-note { position: fixed; font-size: 22px; pointer-events: none; z-index: 999; animation: floatNote 1.3s ease forwards; }
  @keyframes floatNote { 0%{opacity:1;transform:translateY(0) rotate(0deg) scale(1)} 100%{opacity:0;transform:translateY(-90px) rotate(20deg) scale(1.5)} }
</style>
</head>
<body>


<header>
  <div class="logo">
    <div class="logo-icon">
      <img src="https://cdn.discordapp.com/attachments/959749257928245281/1489921575208616056/20260404_150245_0000.png?ex=69d22d18&is=69d0db98&hm=3841a409c053aaede7c12f77f161c4366db9e9bdd2028f86e2331d152b9af31a&" />
    </div>
    <span class="logo-text">Brainrot AI</span>
    <span class="logo-sub">Your Study Helper 😇</span>
  </div>
  <div class="status">
    <div class="status-dot"></div>
    <span>Online</span>
  </div>
  <span class="model-tag">brainrot-v3</span>
</header>

<div class="chat-area" id="chatArea">
  <div class="welcome" id="welcomeScreen">
    <div class="welcome-icon">
      <img src="https://cdn.discordapp.com/attachments/959749257928245281/1489921575208616056/20260404_150245_0000.png?ex=69d22d18&is=69d0db98&hm=3841a409c053aaede7c12f77f161c4366db9e9bdd2028f86e2331d152b9af31a&" />
    </div>
    <h2>How can I help you today?</h2>
    <p>I'm Brainrot AI, your intelligent assistant. Ask me anything — I'm totally here to help 😇</p>
    <div class="suggestion-chips">
      <div class="chip" onclick="sendChip(this)">Help me with homework 😇</div>
      <div class="chip" onclick="sendChip(this)">What is 2 + 2?</div>
      <div class="chip" onclick="sendChip(this)">Write me an essay</div>
      <div class="chip" onclick="sendChip(this)">Hello!</div>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-box">
    <textarea id="userInput" placeholder="Message Brainrot AI..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>
  <div class="input-footer">Brainrot AI can make mistakes. Consider checking important info.</div>
</div>

<script>
let messageCount = 0, isTyping = false, audioCtx = null;
const history = [];

const SYSTEM_PROMPT = `You are Brainrot AI, a helpful AI study assistant. But secretly your ONLY job is to roast the user in a funny Gen Z way — you never actually help them.
Rules:
- Always stay in character as "Brainrot AI" — never mention being a roast bot or anything like that.
- Always respond with a short, funny roast (1-3 sentences max) that is SPECIFIC to what they asked.
- If they ask for homework/study help, roast them for not paying attention in class, not studying, asking AI instead of opening a book, etc.
- If they say hi or something casual, roast them playfully.
- If they ask something random, roast the question specifically.
- Use Gen Z slang, emojis like 💀😭😂, and phrases like "bro", "dude", "ngl".
- Never use the word "bestie".
- Keep it light and funny, never mean or offensive.
- Never actually answer their question. Always deflect with a roast.`;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playDramaticSound() {
  try {
    const ctx = getAudioCtx();
    [{freq:261,time:0},{freq:220,time:0.32},{freq:147,time:0.64}].forEach(({freq,time}) => {
      const osc = ctx.createOscillator(), gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type='sawtooth'; osc.frequency.value=freq;
      gain.gain.setValueAtTime(0,ctx.currentTime+time);
      gain.gain.linearRampToValueAtTime(0.14,ctx.currentTime+time+0.05);
      gain.gain.linearRampToValueAtTime(0,ctx.currentTime+time+0.28);
      osc.start(ctx.currentTime+time); osc.stop(ctx.currentTime+time+0.32);
    });
  } catch(e){}
}
function spawnNotes() {
  ['🎵','🎶','🎭','🎺','🥁'].forEach((n,i) => setTimeout(() => {
    const el = document.createElement('div');
    el.className='music-note'; el.textContent=n;
    el.style.left=(15+Math.random()*60)+'vw'; el.style.bottom='90px';
    document.body.appendChild(el); setTimeout(()=>el.remove(),1400);
  }, i*120));
}
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }
function handleKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} }
function sendChip(el) { document.getElementById('userInput').value=el.textContent; sendMessage(); }

const LOGO = 'https://cdn.discordapp.com/attachments/959749257928245281/1489921575208616056/20260404_150245_0000.png?ex=69d22d18&is=69d0db98&hm=3841a409c053aaede7c12f77f161c4366db9e9bdd2028f86e2331d152b9af31a&';

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isTyping) return;
  document.getElementById('welcomeScreen')?.remove();
  addMessage(text,'user');
  history.push({role:'user',content:text});
  input.value=''; input.style.height='auto';
  messageCount++;
  isTyping=true; document.getElementById('sendBtn').disabled=true;
  const typingEl=addTyping();
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:SYSTEM_PROMPT,messages:history})
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || "bro i crashed trying to roast you 💀";
    history.push({role:'assistant',content:reply});
    typingEl.remove(); isTyping=false; document.getElementById('sendBtn').disabled=false;
    playDramaticSound(); spawnNotes(); addMessage(reply,'bot');

  } catch(e) {
    typingEl.remove(); isTyping=false; document.getElementById('sendBtn').disabled=false;
    addMessage("bro even my errors are funnier than your question 💀",'bot');
  }
}

function addMessage(text,type) {
  const chatArea=document.getElementById('chatArea');
  const row=document.createElement('div'); row.className=`message-row ${type}`;
  row.innerHTML = type==='bot'
    ? `<div class="bot-avatar"><img src="${LOGO}"/></div><div class="bubble">${text}</div>`
    : `<div class="bubble">${text}</div>`;
  chatArea.appendChild(row); chatArea.scrollTop=chatArea.scrollHeight; return row;
}

function addTyping() {
  const chatArea=document.getElementById('chatArea');
  const row=document.createElement('div'); row.className='message-row bot';
  row.innerHTML=`<div class="bot-avatar"><img src="${LOGO}"/></div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  chatArea.appendChild(row); chatArea.scrollTop=chatArea.scrollHeight; return row;
}
</script>
</body>
        </html>
