<html lang="en">
<head>

<title>Brainrot AI — Your Study Helper</title>

<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --text: #e8e8f0;
    --muted: #5a5a7a;
    --bot-bubble: #13131f;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  header { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-bottom: 1px solid var(--border); background: rgba(10,10,15,0.95); backdrop-filter: blur(12px); position: relative; z-index: 10; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon { width: 32px; height: 32px; border-radius: 8px; overflow: hidden; }
  .logo-icon img { width: 100%; height: 100%; object-fit: cover; }
  .logo-text { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; background: linear-gradient(90deg, #fff, var(--muted)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .logo-sub { font-size: 11px; color: var(--muted); font-family: 'DM Sans', sans-serif; margin-left: 6px; }
  .status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
  .status-dot { width: 7px; height: 7px; background: #4ade80; border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .model-tag { font-size: 11px; background: var(--border); border: 1px solid #2a2a3e; padding: 3px 10px; border-radius: 20px; color: var(--muted); }
  .chat-area { flex: 1; overflow-y: auto; padding: 24px 0; display: flex; flex-direction: column; gap: 8px; }
  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .message-row { display: flex; padding: 4px 24px; animation: fadeSlide 0.3s ease; }
  @keyframes fadeSlide { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .message-row.user { justify-content: flex-end; }
  .message-row.bot { justify-content: flex-start; }
  .bubble { max-width: 70%; padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.6; }
  .user .bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
  .bot .bubble { background: var(--bot-bubble); border: 1px solid var(--border); color: var(--text); border-bottom-left-radius: 4px; }
  .bot-avatar { width: 28px; height: 28px; border-radius: 8px; overflow: hidden; margin-right: 10px; margin-top: 2px; flex-shrink: 0; }
  .bot-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .typing { display: flex; align-items: center; gap: 4px; padding: 12px 16px; }
  .typing span { width: 7px; height: 7px; background: var(--muted); border-radius: 50%; animation: bounce 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
  .welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 12px; padding: 40px; text-align: center; }
  .welcome-icon { width: 72px; height: 72px; border-radius: 16px; overflow: hidden; margin-bottom: 8px; }
  .welcome-icon img { width: 100%; height: 100%; object-fit: cover; }
  .welcome h2 { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; }
  .welcome p { color: var(--muted); font-size: 14px; max-width: 340px; line-height: 1.6; }
  .suggestion-chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 8px; }
  .chip { padding: 8px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; font-size: 13px; color: var(--muted); cursor: pointer; transition: all 0.2s; }
  .chip:hover { border-color: var(--accent); color: var(--text); }
  .input-area { padding: 16px 24px 20px; border-top: 1px solid var(--border); background: rgba(10,10,15,0.95); backdrop-filter: blur(12px); position: relative; z-index: 10; }
